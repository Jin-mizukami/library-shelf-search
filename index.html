<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>図書館・棚番地検索</title>

  <!-- QRコード読取ライブラリ -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    :root {
      --green: #14532d;
      --green2: #1f7a42;
      --light: #eef8f1;
      --yellow: #ffd400;
      --bg: #f3f7f4;
      --ink: #17211b;
      --muted: #647067;
      --border: #d8e3dc;
      --danger: #b91c1c;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans JP", "Yu Gothic", sans-serif;
    }

    header {
      background: var(--green);
      color: white;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 {
      margin: 0;
      font-size: 21px;
    }

    header p {
      margin: 5px 0 0;
      font-size: 12px;
      opacity: .9;
    }

    main {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 15px 13px 60px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 13px;
    }

    .tab {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      color: var(--green);
      padding: 12px 8px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .tab.active {
      background: var(--green);
      color: white;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 17px;
      margin-bottom: 14px;
      box-shadow: 0 10px 30px rgba(20, 83, 45, .12);
    }

    h2 {
      margin: 0 0 8px;
      font-size: 19px;
    }

    .help {
      margin: 0 0 13px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 800;
    }

    input {
      width: 100%;
      border: 1px solid #b8c7bd;
      border-radius: 11px;
      padding: 13px;
      font-size: 16px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      margin-top: 10px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary {
      background: var(--green);
      color: white;
    }

    .secondary {
      background: var(--light);
      color: var(--green);
    }

    .danger {
      background: #fee2e2;
      color: var(--danger);
    }

    #readerWrap {
      display: none;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #111;
      margin-top: 12px;
      min-height: 300px;
    }

    #readerWrap.active { display: block; }

    #reader {
      width: 100%;
      min-height: 300px;
      background: #111;
    }

    #reader video {
      object-fit: cover !important;
      width: 100% !important;
      min-height: 300px !important;
    }

    .yellow-frame {
      position: absolute;
      left: 14%;
      top: 16%;
      width: 72%;
      height: 68%;
      border: 5px solid var(--yellow);
      border-radius: 18px;
      box-shadow:
        0 0 0 999px rgba(0, 0, 0, .28),
        0 0 18px rgba(255, 212, 0, .8);
      pointer-events: none;
      z-index: 10;
    }

    .scan-text {
      position: absolute;
      left: 50%;
      bottom: 13px;
      transform: translateX(-50%);
      z-index: 11;
      background: rgba(0,0,0,.68);
      color: white;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .message {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 11px;
      line-height: 1.55;
      font-size: 14px;
    }

    .message.show { display: block; }
    .message.info { background: #eaf2ff; color: #173f78; }
    .message.success { background: #dcfce7; color: #14532d; }
    .message.error { background: #fee2e2; color: #8f1d1d; }

    .loading {
      display: none;
      padding: 14px;
      text-align: center;
      color: var(--green);
      font-weight: 800;
    }

    .loading.show { display: block; }

    .result {
      display: none;
      margin-top: 13px;
    }

    .result.show { display: block; }

    .book-card {
      background: white;
      border-left: 7px solid var(--green);
      border-radius: 14px;
      padding: 16px;
      margin-top: 11px;
      box-shadow: 0 5px 17px rgba(0,0,0,.08);
    }

    .title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 11px;
    }

    .shelf-box {
      background: #dcfce7;
      border: 2px solid #7ddc9d;
      border-radius: 13px;
      padding: 14px;
      margin: 10px 0;
    }

    .shelf-label {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .shelf {
      color: #0b3c20;
      font-size: 27px;
      font-weight: 950;
      word-break: break-word;
    }

    dl {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 7px 10px;
      margin: 12px 0 0;
      font-size: 13px;
    }

    dt {
      color: var(--muted);
      font-weight: 800;
    }

    dd {
      margin: 0;
      word-break: break-word;
    }
  </style>
</head>

<body>
<header>
  <h1>📚 本の置き場検索</h1>
  <p>QRコードを黄色い枠にかざすと、棚番地を検索します。</p>
</header>

<main>
  <div class="tabs">
    <button class="tab active" data-panel="scanPanel">QRコード検索</button>
    <button class="tab" data-panel="searchPanel">本の名前で検索</button>
  </div>

  <section id="scanPanel" class="panel active">
    <div class="card">
      <h2>QRコードをかざす</h2>
      <p class="help">
        「カメラを起動」を押し、本のQRコードを黄色い枠の中へ入れてください。
      </p>

      <button id="startBtn" class="primary">📷 カメラを起動</button>
      <button id="stopBtn" class="danger" style="display:none;">カメラを停止</button>

      <div id="readerWrap">
        <div id="reader"></div>
        <div class="yellow-frame"></div>
        <div class="scan-text">QRコードを黄色い枠へ</div>
      </div>

      <label for="manualId">本IDを直接入力</label>
      <input id="manualId" type="text" placeholder="例：BK000001">
      <button id="manualBtn" class="secondary">本IDで検索</button>

      <div id="scanMessage" class="message"></div>
      <div id="scanLoading" class="loading">DBを検索しています...</div>
      <div id="scanResult" class="result"></div>
    </div>
  </section>

  <section id="searchPanel" class="panel">
    <div class="card">
      <h2>本の名前・キーワードから検索</h2>
      <p class="help">
        本の名前、著者、キーワード、本IDの一部を入力してください。
      </p>

      <label for="keyword">検索キーワード</label>
      <input id="keyword" type="search" placeholder="例：VBA 初心者、夏目漱石">
      <button id="searchBtn" class="primary">🔍 検索する</button>

      <div id="searchMessage" class="message"></div>
      <div id="searchLoading" class="loading">DBを検索しています...</div>
      <div id="searchResult" class="result"></div>
    </div>
  </section>
</main>

<script>
  // ============================================================
  // ★ここだけ変更してください★
  // GASをウェブアプリとしてデプロイしたときに表示された
  // https://script.google.com/macros/s/xxxxxxxxxxxx/exec
  // を、下の文字列へ貼り付けます。
  // ============================================================
  const GAS_API_URL = 'ここにGASウェブアプリURLを貼り付ける';
  // ============================================================

  let scanner = null;
  let isScanning = false;
  let scanLocked = false;

  document.querySelectorAll('.tab').forEach(button => {
    button.addEventListener('click', async () => {
      await stopCamera();

      document.querySelectorAll('.tab')
        .forEach(tab => tab.classList.remove('active'));

      document.querySelectorAll('.panel')
        .forEach(panel => panel.classList.remove('active'));

      button.classList.add('active');
      document.getElementById(button.dataset.panel)
        .classList.add('active');
    });
  });

  document.getElementById('startBtn').addEventListener('click', startCamera);
  document.getElementById('stopBtn').addEventListener('click', stopCamera);
  document.getElementById('manualBtn').addEventListener('click', searchManualId);
  document.getElementById('searchBtn').addEventListener('click', searchKeyword);

  document.getElementById('manualId').addEventListener('keydown', event => {
    if (event.key === 'Enter') searchManualId();
  });

  document.getElementById('keyword').addEventListener('keydown', event => {
    if (event.key === 'Enter') searchKeyword();
  });

  async function startCamera() {
    clearArea('scan');

    if (!apiUrlIsValid()) {
      showMessage(
        'scan',
        'GAS_API_URLが未設定です。index.htmlの上部にある設定欄へGASの/exec URLを貼ってください。',
        'error'
      );
      return;
    }

    if (typeof Html5Qrcode !== 'function') {
      showMessage('scan', 'QR読取ライブラリを読み込めませんでした。', 'error');
      return;
    }

    try {
      scanner = new Html5Qrcode('reader');
      scanLocked = false;

      await scanner.start(
        { facingMode: 'environment' },
        {
          fps: 12,
          qrbox: function(width, height) {
            return {
              width: Math.floor(width * 0.72),
              height: Math.floor(height * 0.68)
            };
          },
          aspectRatio: 1.333334
        },
        onScanSuccess,
        function() {}
      );

      isScanning = true;
      document.getElementById('readerWrap').classList.add('active');
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'block';

    } catch (error) {
      showMessage(
        'scan',
        'カメラを起動できませんでした。ChromeまたはSafariで開き、カメラを許可してください。詳細: ' + error,
        'error'
      );
    }
  }

  async function stopCamera() {
    if (!scanner || !isScanning) return;

    try {
      await scanner.stop();
      await scanner.clear();
    } catch (_) {}

    scanner = null;
    isScanning = false;
    scanLocked = false;

    document.getElementById('readerWrap').classList.remove('active');
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
  }

  async function onScanSuccess(decodedText) {
    if (scanLocked) return;

    scanLocked = true;

    const bookId = extractBookId(decodedText);
    document.getElementById('manualId').value = bookId;

    if (navigator.vibrate) navigator.vibrate(120);

    await stopCamera();
    getBookById(bookId, 'scan');
  }

  function extractBookId(rawValue) {
    const raw = String(rawValue || '').trim();

    try {
      const url = new URL(raw);
      const idParam = url.searchParams.get('id');

      if (idParam) return idParam.trim();

      const parts = url.pathname.split('/').filter(Boolean);
      if (parts.length) {
        return decodeURIComponent(parts[parts.length - 1]).trim();
      }
    } catch (_) {}

    return raw;
  }

  function searchManualId() {
    const id = document.getElementById('manualId').value.trim();
    getBookById(id, 'scan');
  }

  function searchKeyword() {
    const keyword = document.getElementById('keyword').value.trim();

    clearArea('search');

    if (!keyword) {
      showMessage('search', '検索キーワードを入力してください。', 'error');
      return;
    }

    if (!apiUrlIsValid()) {
      showMessage('search', 'GAS_API_URLが未設定です。', 'error');
      return;
    }

    setLoading('search', true);

    callJsonp('search', { q: keyword })
      .then(response => {
        setLoading('search', false);

        if (!response || !response.ok) {
          showMessage('search', response?.message || '検索に失敗しました。', 'error');
          return;
        }

        if (!response.books || response.books.length === 0) {
          showMessage('search', '該当する本が見つかりませんでした。', 'info');
          return;
        }

        showMessage('search', response.count + '件見つかりました。', 'success');
        renderBooks(response.books, 'search');
      })
      .catch(error => {
        setLoading('search', false);
        showMessage('search', error.message, 'error');
      });
  }

  function getBookById(id, area) {
    clearArea(area);

    if (!id) {
      showMessage(area, '本IDを入力してください。', 'error');
      return;
    }

    if (!apiUrlIsValid()) {
      showMessage(area, 'GAS_API_URLが未設定です。', 'error');
      return;
    }

    setLoading(area, true);

    callJsonp('book', { id })
      .then(response => {
        setLoading(area, false);

        if (!response || !response.ok) {
          showMessage(area, response?.message || '検索に失敗しました。', 'error');
          return;
        }

        renderBooks([response.book], area);
      })
      .catch(error => {
        setLoading(area, false);
        showMessage(area, error.message, 'error');
      });
  }

  function apiUrlIsValid() {
    return GAS_API_URL.startsWith('https://script.google.com/macros/s/')
      && GAS_API_URL.endsWith('/exec');
  }

  function callJsonp(action, params = {}) {
    return new Promise((resolve, reject) => {
      const callbackName =
        '__libraryCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      const script = document.createElement('script');

      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error('APIの応答がありません。GASの公開設定を確認してください。'));
      }, 15000);

      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        script.remove();
      }

      window[callbackName] = data => {
        cleanup();
        resolve(data);
      };

      const url = new URL(GAS_API_URL);
      url.searchParams.set('action', action);
      url.searchParams.set('callback', callbackName);

      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      script.src = url.toString();

      script.onerror = () => {
        cleanup();
        reject(new Error('GAS APIへ接続できませんでした。'));
      };

      document.body.appendChild(script);
    });
  }

  function renderBooks(books, area) {
    const result = document.getElementById(area + 'Result');

    result.innerHTML = books.map(book => `
      <article class="book-card">
        <div class="title">${escapeHtml(book.title || '名称未登録')}</div>
        <div class="meta">
          ${book.author ? escapeHtml(book.author) + ' ／ ' : ''}
          本ID：${escapeHtml(book.id)}
        </div>

        <div class="shelf-box">
          <div class="shelf-label">戻し場所・棚番地</div>
          <div class="shelf">${escapeHtml(book.shelf || '棚番地未登録')}</div>
        </div>

        <dl>
          <dt>本ID</dt>
          <dd>${escapeHtml(book.id)}</dd>

          <dt>状態</dt>
          <dd>${escapeHtml(book.status || '未設定')}</dd>

          <dt>キーワード</dt>
          <dd>${escapeHtml(book.keywords || '-')}</dd>

          <dt>最終更新</dt>
          <dd>${escapeHtml(book.updatedAt || '-')}</dd>

          <dt>備考</dt>
          <dd>${escapeHtml(book.notes || '-')}</dd>
        </dl>
      </article>
    `).join('');

    result.classList.add('show');
  }

  function clearArea(area) {
    const message = document.getElementById(area + 'Message');
    const result = document.getElementById(area + 'Result');

    message.textContent = '';
    message.className = 'message';

    result.innerHTML = '';
    result.className = 'result';
  }

  function showMessage(area, text, type) {
    const message = document.getElementById(area + 'Message');
    message.textContent = text;
    message.className = 'message show ' + type;
  }

  function setLoading(area, enabled) {
    document.getElementById(area + 'Loading')
      .classList.toggle('show', enabled);
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  window.addEventListener('pagehide', () => {
    stopCamera();
  });
</script>
</body>
</html>
